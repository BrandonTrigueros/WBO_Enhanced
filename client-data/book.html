<!DOCTYPE html>
<html lang="{{language}}">

<head>
	<meta charset="utf-8" />
	<title>{{bookName}} | WBO Enhanced Notebook</title>
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0" />
	<link rel="stylesheet" type="text/css" href="../board.css" />
	<link rel="stylesheet" type="text/css" href="../book.css" />
	<script src="../socket.io/socket.io.js"></script>
	<meta name="description" content="{{translations.tagline}}" />
	<link rel="apple-touch-icon" href="../assets/favicon.svg">
	<link rel="icon" type="image/x-icon" sizes="16x16" href="../assets/favicon.ico">
	<script src="../polyfill.min.js"></script>
</head>

<body class="book-mode">

	<!-- Page thumbnail sidebar -->
	<div id="pageSidebar" class="pageSidebar hidden">
		<div id="pageSidebarList" class="pageSidebarList"></div>
	</div>

	<!-- A4 page wrapper — centres and constrains the canvas -->
	<div id="a4-page-wrapper">
		<div id="board">
			<svg id="canvas" width="794" height="1123" version="1.1" xmlns="http://www.w3.org/2000/svg">
				<defs id="defs"></defs>
				<g id="drawingArea"></g>
				<g id="cursors"></g>
			</svg>
		</div>
	</div>

	<div id="loadingMessage">{{translations.loading}}</div>

	<!-- Page navigation bar (top) -->
	<div id="pageNav">
		<button id="sidebarToggle" title="Page thumbnails">&#9776;</button>
		<button id="prevPage" title="Previous page">&#9664;</button>
		<span id="pageIndicator">
			<span id="pageNumDisplay">{{currentPage}}</span>
			/ <span id="pageTotalDisplay">…</span>
		</span>
		<button id="nextPage" title="Next page">&#9654;</button>
		<button id="addPageBtn" title="{{translations.add_page}}">+</button>
		<button id="deletePageBtn" title="{{translations.delete_page}}">&#128465;</button>
	</div>

	<!-- Reuse the same floating toolbar from board.css -->
	<div id="menu" tabindex="0">
		<div id="menuItems">
			<ul id="tools" class="tools">
				<li class="tool" tabindex="-1">
					<img class="tool-icon" width="35" height="35" src="" alt="icon" />
					<span class="tool-name"></span>
					<img class="tool-icon secondaryIcon" width="35" height="35" src="data:," alt="icon" />
				</li>
			</ul>

			<ul class="tools" id="settings">
				<li class="tool" tabindex="-1">
					<input type="color" id="chooseColor" value="#1913B0" />
					<label class="tool-name" for="chooseColor">{{translations.color}}</label>
					<button type="button" class="paletteBtn" id="colorPaletteToggle" title="Color presets">&#9662;</button>
					<div class="colorPaletteDropdown hidden" id="colorPaletteDropdown">
						<span class="colorPresets" id="colorPresetSel">
							<span class="colorPresetButton"></span>
						</span>
					</div>
				</li>
				<li class="tool" tabindex="-1"
					title="{{translations.size}} ({{translations.keyboard_shortcut}}: alt + {{translations.mousewheel}})">
					<img class="tool-icon" width="60" height="60" src="../assets/icon-size.svg" alt="size" />
					<label class="tool-name slider" for="chooseSize">
						<span>{{translations.size}}</span>
						<input type="range" id="chooseSize" value="4" min="1" max="50" step="1" class="rangeChooser" />
					</label>
				</li>
				<li class="tool" tabindex="-1">
					<span class="tool-icon">
						<svg viewBox="0 0 8 8">
							<pattern id="opacityPattern" x="0" y="0" width="4" height="4"
								patternUnits="userSpaceOnUse">
								<rect x=0 y=0 width=2 height=2 fill=black></rect>
								<rect x=2 y=2 width=2 height=2 fill=black></rect>
								<rect x=2 y=0 width=2 height=2 fill=#eeeeee></rect>
								<rect x=0 y=2 width=2 height=2 fill=#eeeeee></rect>
							</pattern>
							<circle cx=4 cy=4 id="opacityIndicator" r=3.5 fill="url(#opacityPattern)"></circle>
						</svg>
					</span>
					<label class="tool-name slider" for="chooseOpacity">
						<span>{{translations.opacity}}</span>
						<input type="range" id="chooseOpacity" value="1" min="0.2" max="1" step="0.1"
							class="rangeChooser" />
					</label>
				</li>
			</ul>
		</div>
	</div>

	<!-- Data passed from server -->
	<script type="application/json" id="translations">{{{ json translations }}}</script>
	<script type="application/json" id="configuration">{{{ json configuration }}}</script>
	<script type="application/json" id="bookConfig">{"bookName":"{{bookName}}","bookUriComponent":"{{bookUriComponent}}","currentPage":{{currentPage}} }</script>

	<!-- Shared board engine (drawing, tools, sockets) -->
	<script src="../js/lib/path-data-polyfill.js"></script>
	<script src="../js/lib/minitpl.js"></script>
	<script src="../js/lib/intersect.js"></script>
	<script src="../js/core/board.js"></script>
	<script src="../js/core/canvasState.js"></script>
	<script src="../js/core/socketManager.js"></script>
	<script src="../js/core/drawingEngine.js"></script>
	<script src="../js/core/toolRegistry.js"></script>
	<script src="../js/core/uiController.js"></script>
	<script src="../js/shapeRecognizer/config.js"></script>
	<script src="../js/shapeRecognizer/inertia.js"></script>
	<script src="../js/shapeRecognizer/recoSegment.js"></script>
	<script src="../js/shapeRecognizer/circleRecognizer.js"></script>
	<script src="../js/shapeRecognizer/shapeRecognizer.js"></script>
	<script src="../js/shapeRecognizer/shapeRenderer.js"></script>
	<script src="../js/shapeRecognizer/holdTrigger.js"></script>
	<script src="../tools/pencil/wbo_pencil_point.js"></script>
	<script src="../tools/pencil/pencil.js"></script>
	<script src="../tools/eraser/eraser.js"></script>
	<!-- Shape tools (register only — no toolbar button) -->
	<script src="../tools/line/line.js"></script>
	<script src="../tools/rect/rect.js"></script>
	<script src="../tools/ellipse/ellipse.js"></script>
	<!-- Shapes toggle button (toolbar) -->
	<script src="../tools/shapes/shapes.js"></script>
	<script src="../tools/image/image.js"></script>
	<script src="../tools/grid/grid.js"></script>
	<script src="../tools/download/download.js"></script>
	<!-- Registered but hidden from toolbar -->
	<script src="../tools/cursor/cursor.js"></script>
	<script src="../tools/text/text.js"></script>
	<script src="../tools/hand/hand.js"></script>
	<script src="../tools/zoom/zoom.js"></script>
	{{#moderator}}<script src="../tools/clear/clear.js"></script>{{/moderator}}
	<script src="../js/lib/canvasColor.js"></script>

	<!-- Book-specific: page sidebar (loaded BEFORE book.js) -->
	<script src="../js/pageSidebar.js"></script>
	<!-- Book-specific: page management (loaded AFTER board.js) -->
	<script src="../js/book.js"></script>
</body>

</html>
